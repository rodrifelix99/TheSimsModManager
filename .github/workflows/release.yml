name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          $dest = "build/windows/x64/runner/Release"
          foreach ($dll in "msvcp140.dll", "vcruntime140.dll", "vcruntime140_1.dll") {
            Copy-Item "C:\Windows\System32\$dll" $dest
          }
      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = "${{ github.ref_name }}".TrimStart("v")
          Compress-Archive -Path "build/windows/x64/runner/Release/*" `
            -DestinationPath "dist/TheSimsModManager-$version-windows-portable.zip"
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" installer\windows\setup.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      # flutter_acrylic is CocoaPods-only; Swift Package Manager integration
      # (default on newer Flutter) can't resolve its module in MainFlutterWindow.swift.
      - run: flutter config --no-enable-swift-package-manager
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 build.keychain
          echo "$MACOS_CERT_P12" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
      - name: Codesign (Developer ID + hardened runtime)
        run: |
          APP="build/macos/Build/Products/Release/sims_mod_manager.app"
          # Sign nested frameworks/plugins first, then the app bundle itself.
          find "$APP/Contents/Frameworks" -maxdepth 1 \
            \( -name "*.framework" -o -name "*.dylib" \) | while read -r ITEM; do
            codesign --force --timestamp --options runtime \
              --sign "Developer ID Application" "$ITEM"
          done
          codesign --force --timestamp --options runtime \
            --entitlements macos/Runner/Release.entitlements \
            --sign "Developer ID Application" "$APP"
          codesign --verify --deep --strict "$APP"
      - name: Notarize and staple
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        run: |
          APP="build/macos/Build/Products/Release/sims_mod_manager.app"
          echo "$APPSTORE_PRIVATE_KEY" > AuthKey.p8
          ditto -c -k --keepParent "$APP" notarize.zip
          xcrun notarytool submit notarize.zip \
            --key AuthKey.p8 --key-id "$APPSTORE_KEY_ID" \
            --issuer "$APPSTORE_ISSUER_ID" --wait
          rm AuthKey.p8 notarize.zip
          xcrun stapler staple "$APP"
      - name: Package .app zip
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent \
            "build/macos/Build/Products/Release/sims_mod_manager.app" \
            "dist/TheSimsModManager-$VERSION-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package tar.gz
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "dist/TheSimsModManager-$VERSION-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  release:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ### Downloads
            | Platform | File |
            |---|---|
            | Windows installer | `*-windows-setup.exe` |
            | Windows portable | `*-windows-portable.zip`: extract and run `sims_mod_manager.exe` |
            | macOS | `*-macos.zip` |
            | Linux | `*-linux-x64.tar.gz`: extract and run `sims_mod_manager` |

            > **Windows:** the app is not code-signed yet, so SmartScreen may warn on first run; choose *More info → Run anyway*.
