name: sims_mod_manager
description: Cross-platform desktop mod manager for The Sims series (and future moddable games).
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  path: ^1.9.0
  file_selector: ^1.0.3
  flutter_acrylic: ^1.1.4
  shared_preferences: ^2.3.0
  window_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/games/icons/
    - assets/games/logos/
    - assets/sounds/s1/ui/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
